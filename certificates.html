<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Certificates</title>

        <style>
                * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                        font-family: Arial, sans-serif;
                }

                body {
                        background: #0f172a;
                        color: #fff;
                        padding: 20px;
                }

                h1 {
                        text-align: center;
                        margin-bottom: 20px;
                        font-size: clamp(24px, 5vw, 40px);
                }

                /* GRID */
                .cert-grid {
                        display: grid;
                        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                        gap: 15px;
                }

                .cert-card {
                        overflow: hidden;
                        border-radius: 12px;
                        cursor: pointer;
                        transition: transform 0.3s ease;
                }

                .cert-card:hover {
                        transform: scale(1.05);
                }

                .cert-card img {
                        width: 100%;
                        height: 100%;
                        object-fit: cover;
                        display: block;
                        border-radius: 12px;
                }

                /* MODAL */
                .modal {
                        position: fixed;
                        inset: 0;
                        background: rgba(0, 0, 0, 0.8);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        opacity: 0;
                        pointer-events: none;
                        transition: 0.3s ease;
                }

                .modal.show {
                        opacity: 1;
                        pointer-events: all;
                }

                .modal img {
                        max-width: 90%;
                        max-height: 90%;
                        border-radius: 10px;
                }

                .close {
                        position: absolute;
                        top: 20px;
                        right: 30px;
                        font-size: 30px;
                        color: #fff;
                        cursor: pointer;
                }

                /* BACK BUTTON */
                .back {
                        display: inline-block;
                        margin-bottom: 20px;
                        color: #38bdf8;
                        text-decoration: none;
                }
        </style>
</head>

<body>

        <a href="/My-Portfolio/" class="back">← Back to Portfolio</a>

        <h1>My Certificates</h1>

        <div class="cert-grid" id="grid"></div>

        <!-- MODAL -->
        <div class="modal" id="modal">
                <span class="close" id="close">&times;</span>
                <img id="modalImg" />
        </div>

        <script>
                const grid = document.getElementById('grid')

                // 👉 Add your certificate images here

                        './Certificate/Muhammed Niyad (45).webp',
                ]

                // create cards
                certificates.forEach(src => {
                        const div = document.createElement('div')
                        div.classList.add('cert-card')

                        const img = document.createElement('img')
                        img.src = src
                        img.loading = "lazy"

                        div.appendChild(img)
                        grid.appendChild(div)

                        // click to open modal
                        div.addEventListener('click', () => {
                                modal.classList.add('show')
                                modalImg.src = src
                        })
                })

                const modal = document.getElementById('modal')
                const modalImg = document.getElementById('modalImg')
                const closeBtn = document.getElementById('close')

                closeBtn.onclick = () => modal.classList.remove('show')
                modal.onclick = () => modal.classList.remove('show')
        </script>

</body>

</html>
