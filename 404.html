<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 - Page Not Found</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            overflow: hidden;
        }

        h1 {
            font-size: 8rem;
            text-shadow: 0 0 20px cyan;
        }

        p {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: .8;
        }

        a {
            margin-top: 30px;
            text-decoration: none;
            color: black;
            background: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            transition: .3s;
        }

        a:hover {
            transform: scale(1.05);
        }

        .bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: cyan;
            filter: blur(120px);
            opacity: .2;
            z-index: -1;

            animation: move 6s infinite alternate ease-in-out;
        }

        @keyframes move {
            from {
                transform: translate(-100px, -50px);
            }

            to {
                transform: translate(100px, 50px);
            }
        }
    </style>
</head>

<body>

    <div class="bg"></div>

    <h1>404</h1>

    <p>Page not found</p>

    <a href="/My-Portfolio/">Go Home</a>

</body>

</html>
